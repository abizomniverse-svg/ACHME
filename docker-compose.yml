version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: achme-mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin@123}
      MYSQL_DATABASE: ${DB_NAME:-achme}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-admin@123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Backend Express Server Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: achme-backend
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=${MYSQL_ROOT_PASSWORD:-admin@123}
      - DB_NAME=${DB_NAME:-achme}
      - JWT_SECRET=${JWT_SECRET:-97418d0c15d57ade768586b8501e35d34e5a5277f2a0570b6d5b47ef93f5b33e88b80045c60efd77e6edcbb015dbe46cf6747ce1dd8f11361f3e426ddc677c9a}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:3000}
      - DEFAULT_TEST_PASSWORD=${DEFAULT_TEST_PASSWORD:-Test@12345}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - EMAIL_USER=${EMAIL_USER:-thanan757@gmail.com}
      - EMAIL_PASS=${EMAIL_PASS:-ghjv omqm hwji kerq}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  # Frontend React Web Application Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: achme-frontend
    ports:
      - "82:80"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-}
    stdin_open: true
    tty: true
    depends_on:
      - backend
    restart: always

# Persistent Volume Declarations
volumes:
  mysql_data: