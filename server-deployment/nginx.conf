worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Internal Domain Configuration for achme.com
    server {
        listen       80;
        server_name  achme.com www.achme.com;

        # Serve React Frontend Static Files
        location / {
            root   C:/Deployment/achme/frontend;
            index  index.html index.htm;
            
            # React Router / Single Page App Fallback
            try_files $uri $uri/ /index.html;
        }

        # Route API requests to Node.js Backend
        location /api/ {
            proxy_pass http://127.0.0.1:5000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Security: Prevent exposing backend errors directly to client
            proxy_intercept_errors on;
        }

        # Deny access to hidden files and directories (like .git, .env)
        location ~ /\. {
            deny all;
        }
    }
}
